<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Victorian Road Incidents{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="site-title">
        <span class="title-icon">&#9888;</span>
        Victorian Road Incidents Explorer
      </div>
      <nav class="site-nav">
        <a href="{{ url_for('landing') }}"    class="{% if request.endpoint == 'landing'    %}active{% endif %}">Landing</a>
        <a href="{{ url_for('conditions') }}" class="{% if request.endpoint == 'conditions' %}active{% endif %}">Conditions</a>
        <a href="{{ url_for('deepdive') }}"   class="{% if request.endpoint == 'deepdive'   %}active{% endif %}">Deep Dive</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Programming Studio S1 2026 &mdash; Sub-Task A &mdash; Road Incidents Victoria</p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
