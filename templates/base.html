<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Victorian Road Incidents{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ url_for('static', filename='images/favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="site-title">
        <span class="title-icon">&#9888;</span>
        Victorian Road Incidents Explorer
      </div>
      <nav class="site-nav">
        <a href="{{ url_for('landing') }}"    class="{% if request.endpoint == 'landing'    %}active{% endif %}">Landing</a>
        <a href="{{ url_for('mission_statement') }}" class="{% if request.endpoint == 'mission_statement' %}active{% endif %}">Mission</a>
        <a href="{{ url_for('conditions') }}" class="{% if request.endpoint == 'conditions' %}active{% endif %}">Conditions</a>
        <a href="{{ url_for('deepdive') }}"   class="{% if request.endpoint == 'deepdive'   %}active{% endif %}">Deep Dive</a>
        <a href="{{ url_for('focused_view') }}" class="{% if request.endpoint == 'focused_view' %}active{% endif %}">People & Injuries</a>
        <a href="{{ url_for('people_hotspot') }}" class="{% if request.endpoint == 'people_hotspot' %}active{% endif %}">Hotspot Map</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

<footer class="site-footer">
  <p>{% block footer_text %}Programming Studio Sem 1 2026 &mdash; Sub-Task A &mdash; Road Incidents Victoria{% endblock %}</p>
</footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
